<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="SecondChance">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>SecondChance • Buy & Sell</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a2e'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%23c9a84c'>💰</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231a1a2e'/><text x='90' y='115' font-size='100' text-anchor='middle' fill='%23c9a84c'>💰</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --primary: #1e2a4a;
            --gold: #c9a84c;
            --gold-dark: #a68a3e;
            --border: #e5e7eb;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
            --radius: 14px;
            --transition: all 0.2s ease;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        .dark-mode {
            --bg: #0a0a0f;
            --surface: #14141f;
            --text: #e5e7eb;
            --text-secondary: #9ca3af;
            --primary: #4a5b8c;
            --gold: #d4b96a;
            --gold-dark: #c9a84c;
            --border: #1f2937;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: var(--transition);
            user-select: none;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            background: var(--bg);
            position: relative;
        }
        .top-header {
            background: var(--surface);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .logo { font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:900; color:var(--primary); }
        .logo span { color:var(--gold); }
        .header-actions { display:flex; gap:6px; align-items:center; }
        .icon-btn {
            width:36px; height:36px; border-radius:50%; border:none; background:transparent;
            cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center;
            color:var(--text); position:relative; transition:var(--transition);
        }
        .icon-btn:active { transform:scale(0.9); }
        .cart-dot { position:absolute; top:6px; right:6px; width:8px; height:8px; border-radius:50%; background:var(--danger); display:none; }
        .cart-dot.show { display:block; }
        .status-badge {
            padding:4px 10px; border-radius:12px; font-size:0.65rem; font-weight:700; letter-spacing:0.5px;
        }
        .status-pending { background:rgba(217,119,6,0.2); color:var(--warning); }
        .status-approved { background:rgba(5,150,105,0.2); color:var(--success); }
        .status-rejected { background:rgba(220,38,38,0.2); color:var(--danger); }
        .search-bar {
            padding:8px 16px; flex-shrink:0; background:var(--bg);
        }
        .search-input-wrap {
            display:flex; align-items:center; background:var(--surface); border:1px solid var(--border);
            border-radius:24px; overflow:hidden;
        }
        .search-input-wrap input {
            border:none; padding:10px 14px; flex:1; background:transparent;
            color:var(--text); outline:none; font-size:0.85rem; font-family:inherit;
        }
        .search-input-wrap button {
            background:none; border:none; padding:10px 14px; cursor:pointer; color:var(--text-secondary);
        }
        .main-scroll { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
        .bottom-nav {
            background:var(--surface); border-top:1px solid var(--border);
            display:flex; justify-content:space-around; padding:6px 4px calc(6px + var(--safe-bottom));
            flex-shrink:0; box-shadow:0 -2px 8px rgba(0,0,0,0.04);
        }
        .nav-item {
            display:flex; flex-direction:column; align-items:center; gap:2px;
            background:none; border:none; color:var(--text-secondary); font-size:0.6rem;
            font-weight:500; cursor:pointer; padding:6px 4px; border-radius:10px;
            transition:var(--transition); font-family:inherit; min-width:48px;
        }
        .nav-item.active { color:var(--gold); font-weight:700; }
        .nav-item i { font-size:1.1rem; }
        .section-title {
            padding:16px 16px 8px; font-family:'Playfair Display',serif;
            font-size:1.1rem; font-weight:700; display:flex; justify-content:space-between;
        }
        .card {
            background:var(--surface); border-radius:var(--radius); padding:16px;
            margin:0 16px 12px; box-shadow:var(--shadow); border:1px solid var(--border);
        }
        .btn {
            padding:10px 18px; border-radius:25px; border:none; font-weight:600;
            font-size:0.85rem; cursor:pointer; transition:var(--transition); font-family:inherit;
            display:inline-flex; align-items:center; gap:6px; justify-content:center; letter-spacing:0.3px;
        }
        .btn:active { transform:scale(0.95); }
        .btn-gold { background:var(--gold); color:#1a1a1a; }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }
        .btn-block { width:100%; }
        .btn-sm { padding:6px 12px; font-size:0.7rem; }
        .products-grid {
            display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px 16px;
        }
        .product-card {
            background:var(--surface); border-radius:var(--radius); overflow:hidden;
            box-shadow:var(--shadow); border:1px solid var(--border); cursor:pointer; transition:var(--transition);
        }
        .product-card:active { transform:scale(0.97); }
        .product-img {
            width:100%; aspect-ratio:1/1; background-size:cover; background-position:center; background-color:#e5e7eb;
        }
        .product-info { padding:10px; }
        .product-title { font-weight:600; font-size:0.8rem; margin-bottom:4px; }
        .product-price { font-weight:800; font-size:0.95rem; color:var(--gold-dark); }
        .product-footer { display:flex; justify-content:space-between; font-size:0.65rem; color:var(--text-secondary); margin-bottom:6px; }
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200;
            display:flex; align-items:flex-end; justify-content:center;
            opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .modal-overlay.open { opacity:1; pointer-events:auto; }
        .modal-sheet {
            background:var(--surface); border-radius:20px 20px 0 0;
            width:100%; max-width:480px; max-height:85vh; overflow-y:auto;
            padding:20px; transform:translateY(100%);
            transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .modal-overlay.open .modal-sheet { transform:translateY(0); }
        .modal-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; margin-bottom:5px; font-weight:600; font-size:0.8rem; color:var(--text-secondary); text-transform:uppercase; }
        .form-input, .form-select {
            width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:10px;
            background:var(--bg); color:var(--text); font-family:inherit; font-size:0.9rem;
        }
        .toggle-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
        .toggle-switch { position:relative; width:44px; height:24px; }
        .toggle-switch input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; cursor:pointer; inset:0; background:#ccc; border-radius:24px; transition:.3s; }
        .toggle-slider:before { content:""; position:absolute; height:18px; width:18px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.3s; }
        input:checked + .toggle-slider { background:var(--gold); }
        input:checked + .toggle-slider:before { transform:translateX(20px); }
        .hidden { display:none !important; }
        .toast-msg {
            position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
            background:var(--surface); color:var(--text); padding:10px 20px;
            border-radius:25px; box-shadow:0 10px 30px rgba(0,0,0,0.2); z-index:400;
            font-weight:600; font-size:0.85rem; animation:toastIn 0.3s ease; white-space:nowrap;
            border:1px solid var(--border);
        }
        @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(20px); } }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="top-header">
        <div class="logo">Second<span>Chance</span></div>
        <div class="header-actions">
            <button class="icon-btn" onclick="openCart()">🛒<span class="cart-dot" id="cartDot"></span></button>
            <button class="icon-btn" onclick="navigateTo('profile')">👤</button>
        </div>
    </div>
    <div class="search-bar">
        <div class="search-input-wrap">
            <input type="text" id="searchInput" placeholder="Search items..." oninput="applySearch()">
            <button>🔍</button>
        </div>
    </div>
    <div class="main-scroll" id="mainScroll"></div>
    <div class="bottom-nav">
        <button class="nav-item active" data-page="home"><i class="fas fa-home"></i>Home</button>
        <button class="nav-item" data-page="large"><i class="fas fa-couch"></i>Large</button>
        <button class="nav-item" data-page="sell"><i class="fas fa-store"></i>Sell</button>
        <button class="nav-item" data-page="help"><i class="fab fa-whatsapp"></i>Help</button>
        <button class="nav-item" data-page="profile"><i class="fas fa-user"></i>Profile</button>
    </div>
</div>
<div id="modalContainer"></div>

<script>
    // ============ DATA ============
    const MASTER_MPESA = '0792091769';
    const WHATSAPP_NUMBER = '+254753711672';
    const WHATSAPP_LINK = 'https://wa.me/254753711672';

    let currentUser = JSON.parse(localStorage.getItem('sc_user')) || null;
    let cart = JSON.parse(localStorage.getItem('sc_cart')) || [];
    let orders = JSON.parse(localStorage.getItem('sc_orders')) || [];
    let settings = JSON.parse(localStorage.getItem('sc_settings')) || { darkMode: false, notifications: true };
    let page = 'home';
    let adminData = JSON.parse(localStorage.getItem('secondchance_admin_data')) || { payments: [], approvedSellers: [] };

    const productImages = {
        fridge: 'https://images.unsplash.com/photo-1571175443880-49e1d25b2bc5?w=300&h=300&fit=crop',
        pans: 'https://images.unsplash.com/photo-1590794056226-79ef3a8147e1?w=300&h=300&fit=crop',
        phone: 'https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=300&h=300&fit=crop',
        sofa: 'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=300&h=300&fit=crop',
        dress: 'https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=300&h=300&fit=crop',
        rims: 'https://images.unsplash.com/photo-1580274455191-1c62238fa333?w=300&h=300&fit=crop',
        treadmill: 'https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=300&h=300&fit=crop',
        books: 'https://images.unsplash.com/photo-1512820790803-83ca734da794?w=300&h=300&fit=crop',
        stroller: 'https://images.unsplash.com/photo-1555252333-9f8e92e65df9?w=300&h=300&fit=crop',
        drill: 'https://images.unsplash.com/photo-1581147036324-1b3b7a2e1e0a?w=300&h=300&fit=crop',
        car: 'https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=300&h=300&fit=crop'
    };

    const items = [
        { id:1, title:'Samsung Fridge 200L', category:'kitchen', price:45000, desc:'Excellent, 2 years', seller:'Jane', rating:4.5, img:productImages.fridge, isLarge:true },
        { id:2, title:'Non-stick Pan Set', category:'kitchen', price:2500, desc:'Like new', seller:'Mike', rating:4.8, img:productImages.pans, isLarge:false },
        { id:3, title:'iPhone 13 Pro Max', category:'electronics', price:85000, desc:'256GB, with box', seller:'TechKe', rating:4.3, img:productImages.phone, isLarge:false },
        { id:4, title:'Leather Sofa Set', category:'furniture', price:65000, desc:'3+2, brown', seller:'HomeDecor', rating:4.0, img:productImages.sofa, isLarge:true },
        { id:5, title:'Evening Gown', category:'fashion', price:8000, desc:'Size M, designer', seller:'GlamCloset', rating:4.7, img:productImages.dress, isLarge:false },
        { id:6, title:'Alloy Rims 17"', category:'automotive', price:28000, desc:'Set of 4', seller:'CarParts', rating:4.2, img:productImages.rims, isLarge:false },
        { id:7, title:'Electric Treadmill', category:'sports', price:35000, desc:'12 programs', seller:'FitnessKe', rating:4.6, img:productImages.treadmill, isLarge:true },
        { id:8, title:'Harry Potter Set', category:'books', price:5000, desc:'All 7 hardcover', seller:'Bookworm', rating:4.9, img:productImages.books, isLarge:false },
        { id:9, title:'Baby Stroller', category:'baby', price:12000, desc:'Travel system', seller:'NewParent', rating:4.4, img:productImages.stroller, isLarge:false },
        { id:10, title:'Power Drill', category:'tools', price:6500, desc:'18V with bits', seller:'DIYMaster', rating:4.5, img:productImages.drill, isLarge:false },
        { id:11, title:'Toyota Vitz 2019', category:'automotive', price:850000, desc:'Low mileage', seller:'AutoDealer', rating:4.0, img:productImages.car, isLarge:true }
    ];

    function saveAll() {
        localStorage.setItem('sc_cart', JSON.stringify(cart));
        localStorage.setItem('sc_orders', JSON.stringify(orders));
        localStorage.setItem('sc_settings', JSON.stringify(settings));
        if (currentUser) localStorage.setItem('sc_user', JSON.stringify(currentUser));
        localStorage.setItem('secondchance_admin_data', JSON.stringify(adminData));
    }

    function showToast(msg) {
        let toast = document.createElement('div'); toast.className='toast-msg'; toast.textContent=msg;
        document.body.appendChild(toast);
        setTimeout(()=>{ toast.style.opacity='0'; toast.style.transition='opacity 0.3s'; setTimeout(()=>toast.remove(),300); },2000);
    }

    function isVerifiedSeller() {
        if (!currentUser) return false;
        return adminData.approvedSellers.includes(currentUser.id);
    }

    function hasPaidRegistration() {
        if (!currentUser) return false;
        return adminData.payments.some(p => p.userId === currentUser.id && p.status === 'completed');
    }

    function isPendingVerification() {
        if (!currentUser) return false;
        return adminData.payments.some(p => p.userId === currentUser.id && p.status === 'pending');
    }

    // ============ NAVIGATION ============
    function navigateTo(p) {
        page = p;
        renderPage();
        document.getElementById('mainScroll').scrollTop = 0;
    }

    function renderPage() {
        const container = document.getElementById('mainScroll');
        switch(page) {
            case 'home': container.innerHTML = renderHome(); break;
            case 'large': container.innerHTML = renderLargeItems(); break;
            case 'sell': container.innerHTML = renderSellPage(); break;
            case 'help': container.innerHTML = renderHelpPage(); break;
            case 'profile': container.innerHTML = renderProfilePage(); break;
        }
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-item[data-page="${page}"]`);
        if (activeNav) activeNav.classList.add('active');
        updateCartDot();
    }

    // ============ PAGES ============
    function renderHome() {
        let filtered = items.filter(i => !i.isLarge);
        const term = (document.getElementById('searchInput')?.value || '').toLowerCase();
        if (term) filtered = filtered.filter(i => i.title.toLowerCase().includes(term) || i.desc.toLowerCase().includes(term));
        let html = `<div class="section-title">🔥 Trending</div><div class="products-grid">`;
        filtered.forEach(item => {
            html += productCard(item);
        });
        html += `</div>`;
        if (filtered.length===0) html = `<div class="section-title">No items found</div>`;
        return html;
    }

    function renderLargeItems() {
        let large = items.filter(i => i.isLarge);
        let html = `<div class="section-title">🏠 Large Items</div><div class="products-grid">`;
        large.forEach(item => html += productCard(item));
        html += `</div>`;
        return html;
    }

    function productCard(item) {
        return `<div class="product-card" onclick="viewItem(${item.id})">
            <div class="product-img" style="background-image:url('${item.img}');"></div>
            <div class="product-info">
                <div class="product-title">${item.title}</div>
                <div class="product-price">KSH ${item.price.toLocaleString()}</div>
                <div class="product-footer"><span>⭐${item.rating}</span><span>${item.seller}</span></div>
                <button class="btn btn-gold btn-sm btn-block" onclick="event.stopPropagation();addToCart(${item.id})">Add to cart</button>
            </div>
        </div>`;
    }

    function renderSellPage() {
        if (!currentUser) return loginPrompt('sell');
        if (isPendingVerification()) return pendingVerificationView();
        if (!hasPaidRegistration() && !isPendingVerification()) return sellerRegistrationView();
        let myItems = items.filter(i => i.seller === currentUser.name);
        let html = `<div class="section-title">💼 Seller Dashboard</div>
        <div class="card"><span class="status-badge status-approved">✅ Verified Seller</span><p>Welcome, ${currentUser.name}!</p>
        <button class="btn btn-gold btn-block" onclick="showListForm()">+ List New Item</button></div>
        <div class="section-title">📦 My Listings (${myItems.length})</div>`;
        myItems.forEach(item => html += `<div class="card" style="display:flex;gap:10px;align-items:center;">
            <div style="width:50px;height:50px;background-image:url(${item.img});background-size:cover;border-radius:8px;"></div>
            <div><strong>${item.title}</strong><br>KSH ${item.price}</div></div>`);
        if (myItems.length===0) html += `<div class="card">No listings yet.</div>`;
        return html;
    }

    function renderHelpPage() {
        return `<div class="section-title">💬 Need Help?</div>
        <div class="card" style="text-align:center;">
            <p style="font-size:3rem;">👋</p>
            <h3>Chat with us on WhatsApp</h3>
            <p style="color:var(--text-secondary);margin:8px 0;">We reply quickly!</p>
            <button class="btn btn-gold btn-block" onclick="openWhatsApp()"><i class="fab fa-whatsapp"></i> ${WHATSAPP_NUMBER}</button>
        </div>
        <div class="card">
            <h4>📧 Email Support</h4>
            <p style="font-size:0.8rem;">support@secondchance.co.ke</p>
        </div>`;
    }

    function renderProfilePage() {
        if (!currentUser) return loginPrompt('profile');
        let html = `<div class="section-title">👤 Profile</div>
        <div class="card">
            <p><strong>${currentUser.name}</strong></p>
            <p>Phone: ${currentUser.phone || '—'}</p>
            <p>Seller Status: ${isVerifiedSeller() ? '<span class="status-badge status-approved">Verified</span>' : (isPendingVerification() ? '<span class="status-badge status-pending">Pending</span>' : '<span class="status-badge status-rejected">Not registered</span>')}</p>
        </div>
        <div class="card">
            <div class="toggle-row"><span>🌙 Dark Mode</span>
                <label class="toggle-switch"><input type="checkbox" ${settings.darkMode?'checked':''} onchange="toggleDark(this.checked)"><span class="toggle-slider"></span></label>
            </div>
            <div class="toggle-row"><span>🔔 Notifications</span>
                <label class="toggle-switch"><input type="checkbox" ${settings.notifications?'checked':''} onchange="settings.notifications=this.checked;saveAll()"><span class="toggle-slider"></span></label>
            </div>
            <button class="btn btn-outline btn-block" onclick="logout()">Logout</button>
        </div>
        <div class="card">
            <h4>📦 Recent Orders</h4>
            ${orders.filter(o=>o.buyer===currentUser.name).slice(0,3).map(o=>`
                <div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:0.8rem;">
                    <strong>#${o.id}</strong> - ${o.items.join(', ')}<br>KSH ${o.total} • ${new Date(o.date).toLocaleDateString()}
                </div>`).join('') || '<p style="font-size:0.8rem;">No orders yet</p>'}
        </div>`;
        return html;
    }

    function loginPrompt(returnPage) {
        return `<div class="card" style="margin-top:20px;"><p>Please login to access this section.</p>
        <button class="btn btn-gold btn-block" onclick="showLogin('${returnPage}')">Login / Register</button></div>`;
    }

    function pendingVerificationView() {
        return `<div class="section-title">⏳ Verification Pending</div>
        <div class="card" style="text-align:center;">
            <p style="font-size:3rem;">⏳</p>
            <h3>Payment Under Review</h3>
            <p style="color:var(--text-secondary);">Your KSH 350 registration is being verified by admin. You can still browse and buy items.</p>
            <button class="btn btn-gold btn-block" onclick="openWhatsApp()">Contact Admin: ${WHATSAPP_NUMBER}</button>
        </div>`;
    }

    function sellerRegistrationView() {
        return `<div class="section-title">💰 Become a Seller</div>
        <div class="card card-gold">
            <h3>Register for KSH 350</h3>
            <p style="margin:8px 0;">Send to <strong>${MASTER_MPESA}</strong> via M-Pesa, then enter confirmation code.</p>
            <button class="btn btn-gold btn-block" onclick="showRegistrationModal()">Pay KSH 350</button>
        </div>`;
    }

    // ============ MODALS ============
    function showLogin(fromPage) {
        let html = `<div class="modal-overlay open" id="loginModal" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">
            <div class="modal-handle"></div><h2>Create Account</h2>
            <div class="form-group"><label>Full Name</label><input class="form-input" id="loginName"></div>
            <div class="form-group"><label>Phone</label><input class="form-input" id="loginPhone"></div>
            <button class="btn btn-gold btn-block" onclick="registerUser('${fromPage}')">Register</button>
            <button class="btn btn-outline btn-block" onclick="closeModal()">Cancel</button>
        </div></div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function registerUser(fromPage) {
        const name = document.getElementById('loginName').value.trim();
        if (!name) return alert('Enter name');
        currentUser = { id: Date.now(), name, phone: document.getElementById('loginPhone').value };
        saveAll();
        closeModal();
        page = fromPage;
        renderPage();
    }

    function showRegistrationModal() {
        let html = `<div class="modal-overlay open" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">
            <div class="modal-handle"></div><h2>📱 M-Pesa Payment</h2>
            <div style="background:#1a1a1a;color:#4caf50;padding:16px;border-radius:12px;text-align:center;">
                <p>Send <strong>KSH 350</strong> to:</p>
                <p style="font-size:1.5rem;font-weight:800;">${MASTER_MPESA}</p>
            </div>
            <div class="form-group"><label>M-Pesa Code</label><input class="form-input" id="mpesaCode" placeholder="QWE1234567"></div>
            <button class="btn btn-gold btn-block" onclick="submitRegistration()">Submit for Verification</button>
            <button class="btn btn-outline btn-block" onclick="closeModal()">Cancel</button>
        </div></div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function submitRegistration() {
        const code = document.getElementById('mpesaCode').value.trim();
        if (!code) return alert('Enter M-Pesa code');
        adminData.payments.push({ id:Date.now(), userId:currentUser.id, userName:currentUser.name, amount:350, method:'mpesa', code, status:'pending', date:new Date().toISOString() });
        saveAll();
        closeModal();
        showToast('Payment submitted! Await admin verification.');
        page = 'sell';
        renderPage();
    }

    function showListForm() {
        alert('List form would open here. (Simulated)');
    }

    function viewItem(id) {
        const item = items.find(i=>i.id===id);
        if (!item) return;
        let html = `<div class="modal-overlay open" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">
            <div class="modal-handle"></div>
            <img src="${item.img}" style="width:100%;border-radius:12px;aspect-ratio:1/1;object-fit:cover;">
            <h2>${item.title}</h2>
            <p style="font-size:1.5rem;font-weight:800;color:var(--gold-dark);">KSH ${item.price.toLocaleString()}</p>
            <p>${item.desc}</p>
            <p>Seller: ${item.seller} • ⭐${item.rating}</p>
            <button class="btn btn-gold btn-block" onclick="addToCart(${item.id});closeModal();">Add to Cart</button>
            <button class="btn btn-outline btn-block" onclick="closeModal()">Close</button>
        </div></div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function openCart() {
        const total = cart.reduce((s,i)=>s+i.price,0);
        const comm = total>=10000 ? total*0.05 : total*0.03;
        let html = `<div class="modal-overlay open" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">
            <div class="modal-handle"></div><h2>🛒 Cart</h2>`;
        if (cart.length===0) {
            html += `<div style="text-align:center;padding:30px;"><p style="font-size:3rem;">🛍️</p><p>Your cart is empty</p></div>`;
        } else {
            cart.forEach(item => {
                html += `<div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;background:var(--bg);padding:8px;border-radius:10px;">
                    <div style="width:40px;height:40px;background-image:url(${item.img});background-size:cover;border-radius:6px;"></div>
                    <div style="flex:1;"><strong>${item.title}</strong><br>KSH ${item.price}</div>
                    <button onclick="removeFromCart(${item.cartId})">🗑</button></div>`;
            });
            html += `<hr><p>Subtotal: KSH ${total}</p><p style="color:var(--gold);">Commission (${total>=10000?'5%':'3%'}): KSH ${comm}</p>
            <p>Seller gets: KSH ${(total-comm).toFixed(2)}</p>
            <button class="btn btn-gold btn-block" onclick="checkout()">Place Order</button>`;
        }
        html += `<button class="btn btn-outline btn-block" onclick="closeModal()">Close</button></div></div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function addToCart(id) {
        const item = items.find(i=>i.id===id);
        if (!item) return;
        cart.push({...item, cartId:Date.now()});
        saveAll();
        updateCartDot();
        showToast(`${item.title} added!`);
    }

    function removeFromCart(cartId) {
        cart = cart.filter(i=>i.cartId!==cartId);
        saveAll();
        updateCartDot();
        openCart();
    }

    function checkout() {
        if (!currentUser) { closeModal(); showLogin(page); return; }
        if (cart.length===0) return;
        const total = cart.reduce((s,i)=>s+i.price,0);
        const comm = total>=10000 ? total*0.05 : total*0.03;
        orders.push({ id:Date.now(), buyer:currentUser.name, buyerId:currentUser.id, items:cart.map(i=>i.title), total, commission:comm, date:new Date().toISOString() });
        cart = [];
        saveAll();
        closeModal();
        updateCartDot();
        showToast('Order placed! ✅');
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('sc_user');
        cart = [];
        saveAll();
        updateCartDot();
        page = 'home';
        renderPage();
    }

    function toggleDark(val) {
        settings.darkMode = val;
        document.body.classList.toggle('dark-mode', val);
        saveAll();
    }

    function openWhatsApp() {
        window.open(`${WHATSAPP_LINK}?text=Hello%2C%20I%20need%20help%20with%20SecondChance`, '_blank');
    }

    function applySearch() { if (page==='home'||page==='large') renderPage(); }
    function updateCartDot() { document.getElementById('cartDot').classList.toggle('show', cart.length>0); }
    function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

    // Admin helpers (for testing)
    window.verifySeller = function(userId) {
        const p = adminData.payments.find(p=>p.userId===userId && p.status==='pending');
        if (p) { p.status='completed'; if (!adminData.approvedSellers.includes(userId)) adminData.approvedSellers.push(userId); saveAll(); return 'Verified!'; }
        return 'No pending payment';
    };
    window.verifyAll = function() {
        adminData.payments.forEach(p=>{ if(p.status==='pending'){ p.status='completed'; if(!adminData.approvedSellers.includes(p.userId)) adminData.approvedSellers.push(p.userId); } });
        saveAll(); return 'All verified!';
    };

    // Init
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            page = e.currentTarget.dataset.page;
            renderPage();
        });
    });
    if (settings.darkMode) document.body.classList.add('dark-mode');
    renderPage();
    updateCartDot();
</script>
</body>
    </html>
