    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --primary: #1e2a4a;
            --gold: #c9a84c;
            --gold-dark: #a68a3e;
            --border: #e5e7eb;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 20px;
            --transition: all 0.25s ease;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --font: 'Inter', -apple-system, sans-serif;
        }
        .dark-mode {
            --bg: #0a0a0f;
            --surface: #14141f;
            --text: #e5e7eb;
            --text-secondary: #9ca3af;
            --primary: #4a5b8c;
            --gold: #d4b96a;
            --gold-dark: #c9a84c;
            --border: #1f2937;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { width:100%; height:100%; overflow:hidden; position:fixed; top:0; left:0; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            background: var(--bg);
            position: relative;
        }
        @media (min-width: 481px) {
            .app-container {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
                box-shadow: 0 0 60px rgba(0,0,0,0.1);
            }
        }
        /* Install Banner */
        .install-banner {
            background: linear-gradient(135deg, var(--primary), #2a3f6e);
            color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex-shrink: 0;
            animation: slideDown 0.4s ease;
            position: relative;
            z-index: 20;
        }
        .install-banner.hidden { display: none; }
        .install-banner:active { opacity: 0.9; }
        .install-icon {
            width: 44px; height: 44px; border-radius: 12px;
            background: var(--gold); display: flex; align-items: center;
            justify-content: center; font-size: 1.3rem; flex-shrink: 0;
        }
        .install-text { flex: 1; }
        .install-text strong { font-size: 0.9rem; display: block; }
        .install-text span { font-size: 0.75rem; opacity: 0.85; }
        .install-arrow { font-size: 1.2rem; opacity: 0.7; }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .top-header {
            background: var(--surface);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -1px;
        }
        .logo span { color: var(--gold); }
        .header-actions { display: flex; gap: 6px; align-items: center; }
        .icon-btn {
            width: 36px; height: 36px; border-radius: 50%; border: none; background: transparent;
            cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
            color: var(--text); position: relative; transition: var(--transition);
        }
        .icon-btn:active { transform: scale(0.9); }
        .cart-dot {
            position: absolute; top: 6px; right: 6px; width: 8px; height: 8px;
            border-radius: 50%; background: var(--danger); display: none;
        }
        .cart-dot.show { display: block; }
        .status-badge {
            padding: 4px 10px; border-radius: 12px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px;
        }
        .status-pending { background: rgba(217,119,6,0.2); color: var(--warning); }
        .status-approved { background: rgba(5,150,105,0.2); color: var(--success); }
        .search-bar { padding: 8px 16px; flex-shrink: 0; background: var(--bg); }
        .search-input-wrap {
            display: flex; align-items: center; background: var(--surface);
            border: 1px solid var(--border); border-radius: 24px; overflow: hidden;
        }
        .search-input-wrap input {
            border: none; padding: 10px 14px; flex: 1; background: transparent;
            color: var(--text); outline: none; font-size: 0.85rem; font-family: inherit;
        }
        .search-input-wrap button {
            background: none; border: none; padding: 10px 14px; cursor: pointer; color: var(--text-secondary);
        }
        .main-scroll {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            -webkit-overflow-scrolling: touch; padding-bottom: 8px;
        }
        .bottom-nav {
            background: var(--surface); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding: 6px 4px calc(6px + var(--safe-bottom)); flex-shrink: 0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.04); z-index: 10;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            background: none; border: none; color: var(--text-secondary); font-size: 0.6rem;
            font-weight: 500; cursor: pointer; padding: 6px 4px; border-radius: 10px;
            transition: var(--transition); font-family: inherit; min-width: 48px;
        }
        .nav-item.active { color: var(--gold); font-weight: 700; }
        .nav-item i { font-size: 1.1rem; }
        .section-title {
            padding: 16px 16px 8px; font-family: 'Playfair Display', serif;
            font-size: 1.1rem; font-weight: 700;
        }
        .card {
            background: var(--surface); border-radius: var(--radius); padding: 16px;
            margin: 0 16px 12px; box-shadow: var(--shadow-sm); border: 1px solid var(--border);
        }
        .card-gold { border: 2px solid var(--gold); background: linear-gradient(135deg, var(--surface), rgba(201,168,76,0.05)); }
        .btn {
            padding: 10px 18px; border-radius: 25px; border: none; font-weight: 600;
            font-size: 0.85rem; cursor: pointer; transition: var(--transition); font-family: inherit;
            display: inline-flex; align-items: center; gap: 6px; justify-content: center; letter-spacing: 0.3px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-gold { background: var(--gold); color: #1a1a1a; font-weight: 700; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-block { width: 100%; }
        .btn-sm { padding: 6px 12px; font-size: 0.7rem; }
        .btn-install {
            background: linear-gradient(135deg, #1a1a2e, #3d2c5e);
            color: white; border: 2px solid var(--gold);
            animation: pulse-btn 2s infinite;
        }
        @keyframes pulse-btn {
            0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(201,168,76,0); }
        }
        .products-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 16px;
        }
        .product-card {
            background: var(--surface); border-radius: var(--radius); overflow: hidden;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border); cursor: pointer; transition: var(--transition);
        }
        .product-card:active { transform: scale(0.97); }
        .product-img {
            width: 100%; aspect-ratio: 1/1; background-size: cover;
            background-position: center; background-color: #e5e7eb; position: relative;
        }
        .product-badge {
            position: absolute; top: 6px; right: 6px; background: var(--gold);
            color: #1a1a1a; padding: 2px 8px; border-radius: 10px; font-size: 0.6rem; font-weight: 700;
        }
        .product-info { padding: 10px; }
        .product-title { font-weight: 600; font-size: 0.8rem; margin-bottom: 4px; line-height: 1.3; }
        .product-price { font-weight: 800; font-size: 0.95rem; color: var(--gold-dark); margin-bottom: 6px; }
        .product-footer {
            display: flex; justify-content: space-between; font-size: 0.65rem;
            color: var(--text-secondary); margin-bottom: 6px;
        }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
            display: flex; align-items: flex-end; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-sheet {
            background: var(--surface); border-radius: 20px 20px 0 0;
            width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto;
            padding: 20px; transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .modal-overlay.open .modal-sheet { transform: translateY(0); }
        .modal-handle {
            width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px;
        }
        .modal-sheet h2 {
            font-family: 'Playfair Display', serif; font-size: 1.3rem;
            margin-bottom: 16px; font-weight: 700;
        }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.8rem;
            color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border);
            border-radius: 10px; background: var(--bg); color: var(--text);
            font-family: inherit; font-size: 0.9rem; transition: var(--transition);
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none; border-color: var(--gold);
        }
        .toggle-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .toggle-row span { font-weight: 500; font-size: 0.9rem; }
        .toggle-switch { position: relative; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; cursor: pointer; inset: 0; background: #ccc;
            border-radius: 24px; transition: .3s;
        }
        .toggle-slider:before {
            content: ""; position: absolute; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s;
        }
        input:checked + .toggle-slider { background: var(--gold); }
        input:checked + .toggle-slider:before { transform: translateX(20px); }
        .hidden { display: none !important; }
        .verification-box {
            background: rgba(217,119,6,0.1); border: 2px dashed var(--warning);
            border-radius: var(--radius); padding: 16px; text-align: center; margin: 12px 0;
        }
        .verification-box i { font-size: 2rem; color: var(--warning); margin-bottom: 8px; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast-msg {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: var(--surface); color: var(--text); padding: 10px 20px;
            border-radius: 25px; box-shadow: var(--shadow-lg); z-index: 400;
            font-weight: 600; font-size: 0.85rem; animation: toastIn 0.3s ease;
            white-space: nowrap; border: 1px solid var(--border);
        }
        .download-section {
            text-align: center; padding: 20px 16px;
        }
        .download-section h3 {
            font-family: 'Playfair Display', serif; margin-bottom: 8px;
        }
        .download-section p {
            color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 16px;
        }
    </style>
</head>

        { id:12, title:'Queen Size Bed Frame', category:'furniture', price:18000, desc:'Wooden with storage drawers', condition:'good', seller:'FurnitureHub', rating:4.3, img:productImages.bed, isLarge:true },
        { id:13, title:'Dining Table 6-Seater', category:'furniture', price:22000, desc:'Solid mango wood', condition:'good', seller:'WoodCraft', rating:4.4, img:productImages.table, isLarge:true },
        { id:14, title:'Large Dog Kennel Wooden', category:'pets', price:4500, desc:'Suitable for large breeds', condition:'good', seller:'PetLover', rating:4.3, img:productImages.kennel, isLarge:false },
        { id:15, title:'Nike Air Max 90', category:'fashion', price:4500, desc:'Size 42, worn once', condition:'like-new', seller:'SneakerHead', rating:4.7, img:productImages.shoes, isLarge:false }
    ];

    function saveAll() {
        localStorage.setItem('sc_cart', JSON.stringify(cart));
        localStorage.setItem('sc_orders', JSON.stringify(orders));
        localStorage.setItem('sc_settings', JSON.stringify(settings));
        if (currentUser) localStorage.setItem('sc_user', JSON.stringify(currentUser));
        localStorage.setItem('secondchance_admin_data', JSON.stringify(adminData));
    }

    function showToast(msg) {
        const existing = document.querySelector('.toast-msg');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, 2200);
    }

    function isVerifiedSeller() {
        if (!currentUser) return false;
        return adminData.approvedSellers.includes(currentUser.id);
    }
    function hasPaidRegistration() {
        if (!currentUser) return false;
        return adminData.payments.some(p => p.userId === currentUser.id && p.status === 'completed');
    }
    function isPendingVerification() {
        if (!currentUser) return false;
        return adminData.payments.some(p => p.userId === currentUser.id && p.status === 'pending');
    }

    function navigateTo(p) {
        page = p;
        renderPage();
        document.getElementById('mainScroll').scrollTop = 0;
    }

    function renderPage() {
        const container = document.getElementById('mainScroll');
        switch(page) {
            case 'home': container.innerHTML = renderHome(); break;
            case 'large': container.innerHTML = renderLargeItems(); break;
            case 'sell': container.innerHTML = renderSellPage(); break;
            case 'help': container.innerHTML = renderHelpPage(); break;
            case 'profile': container.innerHTML = renderProfilePage(); break;
        }
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-item[data-page="${page}"]`);
        if (activeNav) activeNav.classList.add('active');
        updateCartDot();
    }

    function renderHome() {
        let filtered = items.filter(i => !i.isLarge);
        const term = (document.getElementById('searchInput')?.value || '').toLowerCase();
        if (term) filtered = filtered.filter(i => i.title.toLowerCase().includes(term) || i.desc.toLowerCase().includes(term));
        let html = '';
        // Add download section at top of home page
        html += `<div class="download-section">
            <h3>📲 Get the App</h3>
            <p>Install SecondChance on your phone for the best experience</p>
            <button class="btn btn-install btn-block" onclick="installApp()">
                <i class="fas fa-download"></i> Download / Install App
            </button>
            <p style="font-size:0.7rem;color:var(--text-secondary);margin-top:6px;">Works on Android, iPhone, and desktop</p>
        </div>`;
        html += `<div class="section-title">🔥 Trending Items</div><div class="products-grid">`;
        filtered.forEach(item => { html += productCard(item); });
        html += `</div>`;
        if (filtered.length === 0) html = `<div class="section-title">📭 No items found</div><div class="card"><p style="text-align:center;color:var(--text-secondary);">Try a different search term</p></div>`;
        return html;
    }

    function renderLargeItems() {
        let large = items.filter(i => i.isLarge);
        let html = `<div class="section-title">🏠 Large Items</div><div class="products-grid">`;
        large.forEach(item => { html += productCard(item); });
        html += `</div>`;
        return html;
    }

    function productCard(item) {
        return `<div class="product-card" onclick="viewItem(${item.id})">
            <div class="product-img" style="background-image:url('${item.img}');">
                ${item.isLarge ? '<div class="product-badge">LARGE</div>' : ''}
            </div>
            <div class="product-info">
                <div class="product-title">${item.title}</div>
                <div class="product-price">KSH ${item.price.toLocaleString()}</div>
                <div class="product-footer">
                    <span>⭐ ${item.rating}</span>
                    <span>${item.seller}</span>
                </div>
                <button class="btn btn-gold btn-sm btn-block" onclick="event.stopPropagation();addToCart(${item.id})">+ Add to Cart</button>
            </div>
        </div>`;
    }

    function renderSellPage() {
        if (!currentUser) {
            return `<div class="card" style="margin-top:20px;"><p style="text-align:center;">Please login to sell items</p><button class="btn btn-gold btn-block" onclick="showLogin()">Login / Register</button></div>`;
        }
        if (isPendingVerification()) {
            return `<div class="section-title">⏳ Verification Pending</div>
            <div class="card"><div class="verification-box">
                <i class="fas fa-clock"></i>
                <h3>Payment Under Review</h3>
                <p style="color:var(--text-secondary);">Your KSH 350 registration has been submitted. Admin is reviewing it.</p>
                <p style="color:var(--warning);">You can browse and buy, but selling is locked until approved.</p>
                <button class="btn btn-gold btn-block" onclick="contactAdmin()" style="margin-top:12px;">
                    <i class="fab fa-whatsapp"></i> Contact Admin: ${WHATSAPP_NUMBER}
                </button>
            </div></div>`;
        }
        if (!hasPaidRegistration()) {
            return `<div class="section-title">💰 Become a Seller</div>
            <div class="card card-gold">
                <h3 style="color:var(--gold-dark);">Register as a Seller</h3>
                <p style="font-size:1.2rem;font-weight:800;">KSH 350 one-time fee</p>
                <p style="font-size:0.85rem;color:var(--text-secondary);">Send to <strong>${MASTER_MPESA}</strong> via M-Pesa</p>
                <button class="btn btn-gold btn-block" onclick="showRegistrationModal()">💳 Pay KSH 350 Now</button>
            </div>
            <div class="card">
                <h4>Benefits:</h4>
                <ul style="font-size:0.85rem;padding-left:20px;margin-top:8px;">
                    <li>List unlimited items</li>
                    <li>3% commission (under KSH 10k)</li>
                    <li>5% commission (KSH 10k+)</li>
                    <li>Admin-reviewed listings</li>
                </ul>
            </div>`;
        }
        let myItems = items.filter(i => i.seller === currentUser.name);
        return `<div class="section-title">💼 My Seller Dashboard</div>
        <div class="card">
            <span class="status-badge status-approved">✅ Verified Seller</span>
            <p style="margin-top:8px;">Welcome, ${currentUser.name}!</p>
            <button class="btn btn-gold btn-block" onclick="showListForm()">+ List New Item</button>
        </div>
        <div class="section-title">📦 My Listings (${myItems.length})</div>
        ${myItems.map(item => `
            <div class="card" style="display:flex;gap:10px;align-items:center;">
                <div style="width:50px;height:50px;background-image:url('${item.img}');background-size:cover;border-radius:8px;flex-shrink:0;"></div>
                <div style="flex:1;"><strong>${item.title}</strong><br><span style="color:var(--gold-dark);">KSH ${item.price.toLocaleString()}</span></div>
            </div>
        `).join('') || '<div class="card"><p style="color:var(--text-secondary);">No listings yet</p></div>'}`;
    }

    function renderHelpPage() {
        return `<div class="section-title">💬 Need Help?</div>
        <div class="card" style="text-align:center;">
            <p style="font-size:3rem;">👋</p>
            <h3>Chat with us on WhatsApp</h3>
            <p style="color:var(--text-secondary);margin:8px 0;">We reply quickly — tap below</p>
            <button class="btn btn-gold btn-block" onclick="contactSupport()">
                <i class="fab fa-whatsapp"></i> ${WHATSAPP_NUMBER}
            </button>
        </div>
        <div class="card">
            <h4>📧 Email Support</h4>
            <p style="font-size:0.9rem;">support@secondchance.co.ke</p>
        </div>
        <div class="card">
            <h4>❓ FAQs</h4>
            <p style="font-size:0.85rem;color:var(--text-secondary);">• How to sell? Pay KSH 350 to ${MASTER_MPESA}<br>• Delivery? We partner with Sendy, Fargo, G4S<br>• Returns? Contact seller within 24hrs</p>
        </div>`;
    }

    function renderProfilePage() {
        if (!currentUser) {
            return `<div class="card" style="margin-top:20px;"><p style="text-align:center;">Please login to see your profile</p><button class="btn btn-gold btn-block" onclick="showLogin()">Login / Register</button></div>`;
        }
        const verified = isVerifiedSeller();
        const pending = isPendingVerification();
        return `<div class="section-title">👤 My Profile</div>
        <div class="card">
            <p style="font-size:1.2rem;"><strong>${currentUser.name}</strong></p>
            <p style="color:var(--text-secondary);">Phone: ${currentUser.phone || 'Not set'}</p>
            <p>Seller Status: ${verified ? '<span class="status-badge status-approved">✅ Verified</span>' : pending ? '<span class="status-badge status-pending">⏳ Pending</span>' : '<span class="status-badge status-rejected">Not Registered</span>'}</p>
        </div>
        <div class="card">
            <h4 style="margin-bottom:12px;">⚙️ Settings</h4>
            <div class="toggle-row">
                <span>🌙 Dark Mode</span>
                <label class="toggle-switch">
                    <input type="checkbox" ${settings.darkMode ? 'checked' : ''} onchange="toggleDark(this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="toggle-row">
                <span>🔔 Notifications</span>
                <label class="toggle-switch">
                    <input type="checkbox" ${settings.notifications ? 'checked' : ''} onchange="settings.notifications=this.checked;saveAll()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <button class="btn btn-outline btn-block" onclick="logout()" style="margin-top:8px;">🚪 Logout</button>
        </div>
        <div class="card">
            <h4>📦 Recent Orders</h4>
            ${orders.filter(o => o.buyer === currentUser.name).slice(0, 3).map(o => `
                <div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:0.8rem;">
                    <strong>Order #${o.id}</strong><br>
                    ${o.items.join(', ')}<br>
                    KSH ${o.total.toLocaleString()} • ${new Date(o.date).toLocaleDateString()}
                </div>
            `).join('') || '<p style="font-size:0.85rem;color:var(--text-secondary);">No orders yet</p>'}
        </div>`;
    }

    function showLogin() {
        const html = `<div class="modal-overlay open" id="loginModal" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">
            <div class="modal-handle"></div><h2>Create Account</h2>
            <div class="form-group"><label>Full Name</label><input class="form-input" id="loginName" placeholder="John Doe"></div>
            <div class="form-group"><label>Phone Number</label><input class="form-input" id="loginPhone" placeholder="0712345678"></div>
            <button class="btn btn-gold btn-block" onclick="registerUser()">Register</button>
            <button class="btn btn-outline btn-block" onclick="closeModal()">Cancel</button>
        </div></div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function registerUser() {
        const name = document.getElementById('loginName').value.trim();
        if (!name) return alert('Please enter your name');
        currentUser = { id: Date.now(), name, phone: document.getElementById('loginPhone').value, registeredAt: new Date().toISOString() };
        saveAll(); closeModal();
        showToast(`Welcome, ${name}! 👋`);
    }

    function showRegistrationModal() {
        const html = `<div class="modal-overlay open" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">
            <div class="modal-handle"></div><h2>📱 M-Pesa Payment</h2>
            <div style="background:#1a1a1a;color:#4caf50;padding:16px;border-radius:12px;text-align:center;margin-bottom:16px;">
                <p style="font-size:0.9rem;">Send <strong>KSH 350</strong> to:</p>
                <p style="font-size:1.5rem;font-weight:800;letter-spacing:2px;">${MASTER_MPESA}</p>
                <p style="font-size:0.8rem;">SECONDCHANCE MARKET</p>
            </div>
            <p style="font-size:0.8rem;color:var(--text-secondary);text-align:center;margin-bottom:12px;">⚠️ After sending, enter your M-Pesa confirmation code below.</p>
            <div class="form-group"><label>M-Pesa Transaction Code</label><input class="form-input" id="mpesaCode" placeholder="e.g., QWE1234567"></div>
            <button class="btn btn-gold btn-block" onclick="submitRegistration()">Submit for Verification</button>
            <button class="btn btn-outline btn-block" onclick="closeModal()">Cancel</button>
        </div></div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function submitRegistration() {
        const code = document.getElementById('mpesaCode').value.trim();
        if (!code) return alert('Enter M-Pesa code');
        adminData.payments.push({
            id: Date.now(), userId: currentUser.id, userName: currentUser.name,
            phone: currentUser.phone, amount: 350, method: 'mpesa',
            code: code, status: 'pending', date: new Date().toISOString()
        });
        saveAll(); closeModal();
        showToast('Payment submitted! Awaiting verification ⏳');
        page = 'sell'; renderPage();
    }

    function showListForm() {
        const html = `<div class="modal-overlay open" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">
            <div class="modal-handle"></div><h2>📸 List New Item</h2>
            <div class="form-group"><label>Title</label><input class="form-input" id="sTitle" placeholder="What are you selling?"></div>
            <div class="form-group"><label>Category</label><select class="form-select" id="sCategory"><option>kitchen</option><option>electronics</option><option>furniture</option><option>fashion</option><option>automotive</option><option>sports</option><option>books</option><option>baby</option><option>pets</option><option>tools</option></select></div>
            <div class="form-group"><label>Price (KSH)</label><input class="form-input" type="number" id="sPrice" placeholder="0"></div>
            <div class="form-group"><label>Condition</label><select class="form-select" id="sCondition"><option>new</option><option>like-new</option><option>good</option><option>fair</option></select></div>
            <div class="form-group"><label>Description</label><textarea class="form-textarea" id="sDesc" rows="3" placeholder="Describe your item..."></textarea></div>
            <button class="btn btn-gold btn-block" onclick="submitListing()">Submit for Review</button>
            <button class="btn btn-outline btn-block" onclick="closeModal()">Cancel</button>
        </div></div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function submitListing() {
        const title = document.getElementById('sTitle').value;
        const category = document.getElementById('sCategory').value;
        const price = parseInt(document.getElementById('sPrice').value);
        const desc = document.getElementById('sDesc').value;
        if (!title || !price) return alert('Fill in title and price');
        const newItem = {
            id: Date.now(), title, category, price, desc,
            condition: document.getElementById('sCondition').value,
            seller: currentUser.name, rating: 5.0,
            img: productImages[Object.keys(productImages).find(k => k.includes(category)) || 'drill'] || productImages.drill,
            status: 'pending', isLarge: false
        };
        items.unshift(newItem);
        closeModal();
        showToast('Item submitted for review! ✅');
        renderPage();
    }

    function viewItem(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        const html = `<div class="modal-overlay open" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">
            <div class="modal-handle"></div>
            <img src="${item.img}" style="width:100%;border-radius:12px;aspect-ratio:1/1;object-fit:cover;">
            <h2 style="margin-top:16px;">${item.title}</h2>
            <p style="font-size:1.5rem;font-weight:800;color:var(--gold-dark);">KSH ${item.price.toLocaleString()}</p>
            <p style="color:var(--text-secondary);">${item.desc}</p>
            <p><strong>Seller:</strong> ${item.seller} • ⭐ ${item.rating} • ${item.condition}</p>
            <button class="btn btn-gold btn-block" onclick="addToCart(${item.id});closeModal();">🛒 Add to Cart</button>
            <button class="btn btn-outline btn-block" onclick="closeModal()">Close</button>
        </div></div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function openCart() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        const comm = total >= 10000 ? total * 0.05 : total * 0.03;
        let html = `<div class="modal-overlay open" onclick="if(event.target===this)closeModal()"><div class="modal-sheet">
            <div class="modal-handle"></div><h2>🛒 Your Cart</h2>`;
        if (cart.length === 0) {
            html += `<div style="text-align:center;padding:40px;"><p style="font-size:3rem;">🛍️</p><h3>Cart is empty</h3><p style="color:var(--text-secondary);">Tap + on items to add them</p></div>`;
        } else {
            cart.forEach(item => {
                html += `<div style="display:flex;gap:10px;align-items:center;padding:10px;background:var(--bg);border-radius:10px;margin-bottom:8px;">
                    <div style="width:45px;height:45px;background-image:url(${item.img});background-size:cover;border-radius:6px;"></div>
                    <div style="flex:1;"><strong>${item.title}</strong><br>KSH ${item.price.toLocaleString()}</div>
                    <button onclick="removeFromCart(${item.cartId})" style="background:none;border:none;cursor:pointer;">🗑</button></div>`;
            });
            html += `<hr><div style="display:flex;justify-content:space-between;font-weight:700;"><span>Subtotal</span><span>KSH ${total.toLocaleString()}</span></div>
            <p style="color:var(--gold);font-size:0.85rem;text-align:center;">Commission (${total>=10000?'5%':'3%'}): KSH ${comm.toFixed(2)}</p>
            <p style="text-align:center;font-size:0.85rem;">Seller receives: <strong>KSH ${(total-comm).toFixed(2)}</strong></p>
            <button class="btn btn-gold btn-block" onclick="checkout()">Place Order • KSH ${total.toLocaleString()}</button>`;
        }
        html += `<button class="btn btn-outline btn-block" onclick="closeModal()">Close</button></div></div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function addToCart(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        cart.push({ ...item, cartId: Date.now() });
        saveAll(); updateCartDot();
        showToast(`${item.title} added! 🛒`);
    }

    function removeFromCart(cartId) {
        cart = cart.filter(i => i.cartId !== cartId);
        saveAll(); updateCartDot(); openCart();
    }

    function checkout() {
        if (!currentUser) { closeModal(); showLogin(); return; }
        if (cart.length === 0) return;
        const total = cart.reduce((s, i) => s + i.price, 0);
        const comm = total >= 10000 ? total * 0.05 : total * 0.03;
        orders.push({
            id: Date.now(), buyer: currentUser.name, buyerId: currentUser.id,
            items: cart.map(i => i.title), total, commission: comm,
            date: new Date().toISOString()
        });
        cart = []; saveAll(); closeModal(); updateCartDot();
        showToast('Order placed successfully! ✅');
    }

    function logout() {
        currentUser = null; localStorage.removeItem('sc_user');
        cart = []; saveAll(); updateCartDot(); page = 'home'; renderPage();
        showToast('Logged out');
    }

    function toggleDark(val) { settings.darkMode = val; document.body.classList.toggle('dark-mode', val); saveAll(); }
    function contactAdmin() { window.open(`${WHATSAPP_LINK}?text=Hello%2C%20please%20verify%20my%20seller%20registration.`, '_blank'); }
    function contactSupport() { window.open(`${WHATSAPP_LINK}?text=Hello%2C%20I%20need%20help%20with%20SecondChance.`, '_blank'); }
    function applySearch() { if (page === 'home' || page === 'large') renderPage(); }
    function updateCartDot() { document.getElementById('cartDot').classList.toggle('show', cart.length > 0); }
    function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

    // ============ PWA INSTALL ============
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installBanner').classList.remove('hidden');
    });

    function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User accepted install');
                    showToast('App installed! 🎉');
                }
                deferredPrompt = null;
                document.getElementById('installBanner').classList.add('hidden');
            });
        } else {
            // Fallback for devices/browsers that don't support beforeinstallprompt
            const isIOS = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
            if (isIOS) {
                alert('To install: tap the Share button (📤) then "Add to Home Screen"');
            } else if (window.matchMedia('(display-mode: standalone)').matches) {
                showToast('App is already installed! ✅');
            } else {
                alert('To install: open Chrome menu (⋮) → "Install app" or "Add to Home Screen"');
            }
        }
    }

    window.addEventListener('appinstalled', () => {
        document.getElementById('installBanner').classList.add('hidden');
        deferredPrompt = null;
        showToast('App installed successfully! 🎉');
    });

    // ============ SERVICE WORKER ============
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', (e) => {
                self.skipWaiting();
            });
            self.addEventListener('activate', (e) => {
                e.waitUntil(clients.claim());
            });
            self.addEventListener('fetch', (e) => {
                e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
            });
        `;
        const swBlob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).catch(() => {});
    }

    // ============ ADMIN HELPERS ============
    window.verifySeller = function(userId) {
        const p = adminData.payments.find(p => p.userId === userId && p.status === 'pending');
        if (p) { p.status = 'completed'; if (!adminData.approvedSellers.includes(userId)) adminData.approvedSellers.push(userId); saveAll(); return 'Verified!'; }
        return 'No pending payment found';
    };
    window.verifyAll = function() {
        adminData.payments.forEach(p => { if (p.status === 'pending') { p.status = 'completed'; if (!adminData.approvedSellers.includes(p.userId)) adminData.approvedSellers.push(p.userId); } });
        saveAll(); return 'All verified!';
    };

    // ============ INIT ============
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            page = e.currentTarget.dataset.page;
            renderPage();
        });
    });

    if (settings.darkMode) document.body.classList.add('dark-mode');
    renderPage();
    updateCartDot();
    
    // Check if already installed
    if (window.matchMedia('(display-mode: standalone)').matches) {
        console.log('App running in standalone mode');
    }

    console.log('✅ SecondChance App Ready');
    console.log('📲 Install: Tap the Download button or banner');
    console.log('📱 WhatsApp:', WHATSAPP_NUMBER);
    console.log('💳 M-Pesa:', MASTER_MPESA);
    console.log('🔧 Admin: verifySeller(userId) or verifyAll()');
</script>
</body>
