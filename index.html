    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --primary: #1e2a4a;
            --gold: #c9a84c;
            --gold-dark: #a68a3e;
            --gold-light: #d4b96a;
            --border: #e5e7eb;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --info: #0891b2;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.12);
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 20px;
            --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        .dark-mode {
            --bg: #0a0a0f;
            --surface: #14141f;
            --text: #e5e7eb;
            --text-secondary: #9ca3af;
            --primary: #4a5b8c;
            --gold: #d4b96a;
            --gold-dark: #c9a84c;
            --gold-light: #e0c87a;
            --border: #1f2937;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            background: var(--bg);
            position: relative;
        }

        @media (min-width: 481px) {
            .app-container {
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
                box-shadow: 0 0 60px rgba(0,0,0,0.1);
            }
        }

        /* Header */
        .top-header {
            background: var(--surface);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -1px;
        }
        .logo span { color: var(--gold); }

        .header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            position: relative;
            transition: var(--transition);
        }
        .icon-btn:active { transform: scale(0.9); }

        .cart-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            display: none;
        }
        .cart-dot.show { display: block; }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .status-pending { background: rgba(217,119,6,0.2); color: var(--warning); }
        .status-approved { background: rgba(5,150,105,0.2); color: var(--success); }
        .status-rejected { background: rgba(220,38,38,0.2); color: var(--danger); }

        /* Search */
        .search-bar {
            padding: 8px 16px;
            flex-shrink: 0;
            background: var(--bg);
        }
        .search-input-wrap {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            transition: var(--transition);
        }
        .search-input-wrap:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
        }
        .search-input-wrap input {
            border: none;
            padding: 10px 14px;
            flex: 1;
            background: transparent;
            color: var(--text);
            outline: none;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .search-input-wrap button {
            background: none;
            border: none;
            padding: 10px 14px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        /* Main Content */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        /* Bottom Navigation */
        .bottom-nav {
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 4px calc(6px + var(--safe-bottom));
            flex-shrink: 0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.6rem;
            font-weight: 500;
            cursor: pointer;
            padding: 6px 4px;
            border-radius: 10px;
            transition: var(--transition);
            font-family: inherit;
            min-width: 48px;
        }
        .nav-item.active { color: var(--gold); font-weight: 700; }
        .nav-item i { font-size: 1.1rem; }

        /* Section Titles */
        .section-title {
            padding: 16px 16px 8px;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            margin: 0 16px 12px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .card-gold {
            border: 2px solid var(--gold);
            background: linear-gradient(135deg, var(--surface), rgba(201,168,76,0.05));
        }

        /* Buttons */
        .btn {
            padding: 10px 18px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
            letter-spacing: 0.3px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-gold { background: var(--gold); color: #1a1a1a; font-weight: 700; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: #1a1a1a; }
        .btn-block { width: 100%; }
        .btn-sm { padding: 6px 12px; font-size: 0.7rem; }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 16px 16px;
        }

        .product-card {
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }
        .product-card:active { transform: scale(0.97); }

        .product-img {
            width: 100%;
            aspect-ratio: 1/1;
            background-size: cover;
            background-position: center;
            background-color: #e5e7eb;
            position: relative;
        }

        .product-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--gold);
            color: #1a1a1a;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.6rem;
            font-weight: 700;
        }

        .product-info { padding: 10px; }
        .product-title {
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .product-price {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--gold-dark);
            margin-bottom: 6px;
        }
        .product-footer {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        /* Modal Sheet */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.open { opacity: 1; pointer-events: auto; }

        .modal-sheet {
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .modal-overlay.open .modal-sheet { transform: translateY(0); }

        .modal-handle {
            width: 36px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .modal-sheet h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--gold);
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #ccc;
            border-radius: 24px;
            transition: .3s;
        }
        .toggle-slider:before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: .3s;
        }
        input:checked + .toggle-slider { background: var(--gold); }
        input:checked + .toggle-slider:before { transform: translateX(20px); }

        .hidden { display: none !important; }

        .verification-pending {
            background: rgba(217,119,6,0.1);
            border: 2px dashed var(--warning);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            margin: 12px 0;
        }

        .verification-pending i {
            font-size: 2rem;
            color: var(--warning);
            margin-bottom: 8px;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            font-weight: 700;
        }
        .whatsapp-btn:hover { background: #20bd5a; }

        .install-prompt {
            background: linear-gradient(135deg, var(--primary), #2a3f6e);
            color: white;
            padding: 12px 16px;
            border-radius: var(--radius);
            margin: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }
        .install-prompt:active { transform: scale(0.98); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

</div>

    // ==================== HELPERS ====================
    function saveAll() {
        localStorage.setItem('sc_cart', JSON.stringify(cart));
        localStorage.setItem('sc_orders', JSON.stringify(orders));
        localStorage.setItem('sc_settings', JSON.stringify(settings));

    function showToast(msg, type = 'info') {
        const existing = document.querySelector('.toast-msg');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.cssText = `
            position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
            background:var(--surface); color:var(--text); padding:10px 20px;
            border-radius:25px; box-shadow:var(--shadow-lg); z-index:400;
            font-weight:600; font-size:0.85rem; animation:toastIn 0.3s ease;
            border:1px solid var(--border); white-space:nowrap;
        `;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity 0.3s'; setTimeout(()=>toast.remove(),300); }, 2500);
    }

    function isVerifiedSeller() {
        if (!currentUser) return false;
        return adminData.approvedSellers.includes(currentUser.id);
    }

    function hasPaidRegistration() {
        if (!currentUser) return false;
        return adminData.payments.some(p => p.userId === currentUser.id && p.status === 'completed');
    }

    function isPendingVerification() {
        if (!currentUser) return false;
        return adminData.payments.some(p => p.userId === currentUser.id && p.status === 'pending');
    }

    // ==================== RENDER ====================
    function renderPage() {
        const container = document.getElementById('mainScroll');
        switch(page) {
            case 'home': container.innerHTML = renderHome(); break;
            case 'large': container.innerHTML = renderLargeItems(); break;
            case 'sell': container.innerHTML = renderSellPage(); break;
            case 'services': container.innerHTML = renderServices(); break;
            case 'profile': container.innerHTML = renderProfile(); break;
        }
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`.nav-item[data-page="${page}"]`).classList.add('active');
        updateCartDot();
        updateUserBadge();
    }

    function navigateTo(p) { page = p; renderPage(); document.getElementById('mainScroll').scrollTop = 0; }

    function renderHome() {
        let filtered = items.filter(i => !i.isLarge);
        let searchTerm = document.getElementById('searchInput')?.value?.toLowerCase() || '';
        if (searchTerm) filtered = filtered.filter(i => i.title.toLowerCase().includes(searchTerm) || i.desc.toLowerCase().includes(searchTerm));
        
        return `
        <div class="section-title">🔥 Trending Now</div>
        <div class="products-grid">
            ${filtered.map(item => `
                <div class="product-card" onclick="viewItem(${item.id})">
                    <div class="product-img" style="background-image:url('${item.img}');"></div>
                    <div class="product-info">
                        <div class="product-title">${item.title}</div>
                        <div class="product-price">KSH ${item.price.toLocaleString()}</div>
                        <div class="product-footer">
                            <span>⭐ ${item.rating}</span>
                            <span>${item.seller}</span>
                        </div>
                        <button class="btn btn-gold btn-sm btn-block" onclick="event.stopPropagation();addToCart(${item.id})">Add to cart</button>
                    </div>
                </div>
            `).join('') || '<div style="grid-column:span 2;text-align:center;padding:40px;color:var(--text-secondary);">No items found</div>'}
        </div>`;
    }

    function renderLargeItems() {
        let largeItems = items.filter(i => i.isLarge);
        return `
        <div class="section-title">🏠 Large Items</div>
        <div class="products-grid">
            ${largeItems.map(item => `
                <div class="product-card" onclick="viewItem(${item.id})">
                    <div class="product-img" style="background-image:url('${item.img}');height:180px;"></div>
                    <div class="product-info">
                        <div class="product-title">${item.title}</div>
                        <div class="product-price">KSH ${item.price.toLocaleString()}</div>
                        <div class="product-footer">
                            <span>⭐ ${item.rating}</span>
                            <span>${item.seller}</span>
                        </div>
                        <button class="btn btn-gold btn-sm btn-block" onclick="event.stopPropagation();addToCart(${item.id})">Add to cart</button>
                    </div>
                </div>
            `).join('')}
        </div>`;
    }

    function renderSellPage() {
        if (!currentUser) {
            return `<div class="card" style="margin-top:20px;"><p>Please login to sell items.</p><button class="btn btn-gold btn-block" onclick="showLogin()">Login / Register</button></div>`;
        }
        
        // Check verification status
        if (isPendingVerification()) {
            return `
            <div class="section-title">💼 Seller Status</div>
            <div class="card">
                <div class="verification-pending">
                    <i class="fas fa-clock"></i>
                    <h3>Payment Under Review</h3>
                    <p style="font-size:0.85rem;color:var(--text-secondary);">Your KSH 350 registration payment has been submitted and is being reviewed by our admin team.</p>
                    <p style="font-size:0.8rem;color:var(--warning);margin-top:8px;">⏳ You can continue browsing and buying, but selling is locked until admin approves your payment.</p>
                    <button class="btn whatsapp-btn btn-block" onclick="contactAdmin()" style="margin-top:12px;">
                        <i class="fab fa-whatsapp"></i> Contact Admin: ${WHATSAPP_NUMBER}
                    </button>
                </div>
            </div>`;
        }
        
        if (!hasPaidRegistration() && !isPendingVerification()) {
            return `
            <div class="section-title">💼 Become a Seller</div>
            <div class="card card-gold">
                <h3 style="color:var(--gold-dark);">Register as a Seller</h3>
                <p style="font-size:0.85rem;margin:8px 0;">One-time fee: <strong>KSH 350</strong></p>
                <p style="font-size:0.8rem;color:var(--text-secondary);">Send to <strong>${MASTER_MPESA}</strong> via M-Pesa</p>
                <button class="btn btn-gold btn-block" onclick="showRegistrationPayment()">Pay KSH 350 Now</button>
            </div>
            <div class="card">
                <h4>What you get:</h4>
                <ul style="font-size:0.8rem;color:var(--text-secondary);padding-left:20px;margin-top:8px;">
                    <li>List unlimited items</li>
                    <li>3% commission (under KSH 10k)</li>
                    <li>5% commission (KSH 10k+)</li>
                    <li>Admin-reviewed listings</li>
                    <li>Seller dashboard</li>
                </ul>
            </div>`;
        }
        
        // Verified seller
        let myItems = items.filter(i => i.seller === currentUser.name || i.sellerId === currentUser.id);
        return `
        <div class="section-title">💼 My Seller Dashboard</div>
        <div class="card">
            <span class="status-badge status-approved">✅ Verified Seller</span>
            <p style="margin-top:8px;">Welcome back, ${currentUser.name}!</p>
            <p style="font-size:0.8rem;color:var(--text-secondary);">You can list and sell items.</p>
            <button class="btn btn-gold btn-block" onclick="showListForm()">+ List New Item</button>
        </div>
        <div class="section-title">📦 My Listings (${myItems.length})</div>
        ${myItems.map(item => `
            <div class="card" style="display:flex;gap:10px;align-items:center;">
                <div style="width:50px;height:50px;background-image:url('${item.img}');background-size:cover;border-radius:8px;flex-shrink:0;"></div>
                <div style="flex:1;"><strong>${item.title}</strong><br><span style="color:var(--gold-dark);">KSH ${item.price.toLocaleString()}</span></div>
            </div>
        `).join('') || '<div class="card"><p style="color:var(--text-secondary);">No listings yet</p></div>'}`;
    }

    function renderServices() {
        return `
        <div class="section-title">🛎️ Services</div>
        <div class="card"><h4>📸 Pro Photography</h4><p style="font-size:0.8rem;">Get professional photos for your listing. KSH 500.</p><button class="btn btn-outline btn-sm" onclick="bookService('photo')">Book</button></div>
        <div class="card"><h4>🔍 Item Inspection</h4><p style="font-size:0.8rem;">Certified check for big items. KSH 1,000.</p><button class="btn btn-outline btn-sm" onclick="bookService('inspect')">Schedule</button></div>
        <div class="card"><h4>🛡️ Transit Insurance</h4><p style="font-size:0.8rem;">Cover your delivery. From KSH 200.</p><button class="btn btn-outline btn-sm" onclick="bookService('insurance')">Add</button></div>
        <div class="card"><h4>🚚 Delivery Partners</h4><p style="font-size:0.8rem;">Sendy, Fargo, G4S available.</p><button class="btn btn-outline btn-sm" onclick="showDeliveryOptions()">Calculate</button></div>
        <div class="card"><h4>📊 Market Reports</h4><p style="font-size:0.8rem;">Pricing trends. KSH 2,000/report.</p><button class="btn btn-outline btn-sm" onclick="purchaseReport()">Buy</button></div>`;
    }

    function renderProfile() {
        if (!currentUser) {
            return `<div class="card" style="margin-top:20px;"><p>Please login to see your profile.</p><button class="btn btn-gold btn-block" onclick="showLogin()">Login / Register</button></div>`;
        }
        let verified = isVerifiedSeller();
        let pending = isPendingVerification();
        return `
        <div class="section-title">👤 Profile</div>
        <div class="card">
            <p><strong>${currentUser.name}</strong></p>
            <p style="font-size:0.8rem;color:var(--text-secondary);">Phone: ${currentUser.phone || 'Not set'}</p>
            <p>Seller Status: ${verified ? '<span class="status-badge status-approved">✅ Verified</span>' : pending ? '<span class="status-badge status-pending">⏳ Pending</span>' : '<span class="status-badge status-rejected">Not Registered</span>'}</p>
        </div>
        <div class="card">
            <div class="toggle-row">
                <span>🌙 Dark Mode</span>
                <label class="toggle-switch"><input type="checkbox" ${settings.darkMode?'checked':''} onchange="toggleDark(this.checked)"><span class="toggle-slider"></span></label>
            </div>
            <div class="toggle-row">
                <span>🔔 Notifications</span>
                <label class="toggle-switch"><input type="checkbox" ${settings.notifications?'checked':''} onchange="settings.notifications=this.checked;saveAll()"><span class="toggle-slider"></span></label>
            </div>
            <div class="toggle-row">
                <span>💬 Help (WhatsApp)</span>
                <button class="btn whatsapp-btn btn-sm" onclick="contactSupport()">Chat: ${WHATSAPP_NUMBER}</button>
            </div>
            <button class="btn btn-outline btn-block" onclick="logout()">Logout</button>
        </div>
        <div class="card">
            <h4>📦 My Orders (${orders.filter(o=>o.buyer===currentUser?.name).length})</h4>
            ${orders.filter(o=>o.buyer===currentUser?.name).slice(0,3).map(o=>`
                <div style="font-size:0.8rem;padding:8px 0;border-bottom:1px solid var(--border);">
                    <strong>#${o.id}</strong> - ${o.items.join(', ')}<br>
                    KSH ${o.total.toLocaleString()} • ${new Date(o.date).toLocaleDateString()}
                </div>
            `).join('') || '<p style="font-size:0.8rem;color:var(--text-secondary);">No orders yet</p>'}
        </div>`;
    }

    // ==================== SELLER REGISTRATION ====================
    function showRegistrationPayment() {
        const html = `
        <div class="modal-overlay open" id="regModal" onclick="if(event.target===this)closeModal()">
            <div class="modal-sheet">
                <div class="modal-handle"></div>
                <h2>📱 Register as Seller</h2>
                <div style="background:#1a1a1a;color:#4caf50;padding:16px;border-radius:12px;text-align:center;margin-bottom:16px;">
                    <p style="font-size:0.9rem;">Send <strong>KSH 350</strong> via M-Pesa to:</p>
                    <p style="font-size:1.5rem;font-weight:800;letter-spacing:2px;">${MASTER_MPESA}</p>
                    <p style="font-size:0.8rem;">SECONDCHANCE MARKET</p>
                </div>
                <p style="font-size:0.8rem;color:var(--text-secondary);text-align:center;margin-bottom:12px;">
                    ⚠️ After sending, enter your M-Pesa confirmation code below.<br>
                    Your account will be verified by admin before you can sell.
                </p>
                <div class="form-group">
                    <label>M-Pesa Transaction Code</label>
                    <input type="text" class="form-input" id="mpesaCode" placeholder="e.g., QWE1234567">
                </div>
                <button class="btn btn-gold btn-block" onclick="submitRegistration()">Submit for Verification</button>
                <button class="btn btn-outline btn-block" onclick="closeModal()">Cancel</button>
            </div>
        </div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function submitRegistration() {
        const code = document.getElementById('mpesaCode').value.trim();
        if (!code) return alert('Please enter your M-Pesa transaction code');
        
        // Add to pending payments
        const payment = {
            id: Date.now(),
            userId: currentUser.id,
            userName: currentUser.name,
            phone: currentUser.phone,
            amount: 350,
            method: 'mpesa',
            code: code,
            status: 'pending',
            date: new Date().toISOString()
        };
        adminData.payments.push(payment);
        saveAll();
        
        closeModal();
        showToast('Payment submitted! Awaiting admin verification ⏳');
        
        // Show verification pending message
        setTimeout(() => {
            page = 'sell';
            renderPage();
        }, 500);
    }

    // ==================== ADMIN VERIFICATION SIMULATION ====================
    function contactAdmin() {
        window.open(`${WHATSAPP_LINK}?text=Hello%2C%20I%20submitted%20my%20seller%20registration%20payment.%20Please%20verify%20my%20account.`, '_blank');
    }

    function contactSupport() {
        window.open(`${WHATSAPP_LINK}?text=Hello%2C%20I%20need%20help%20with%20SecondChance%20app.`, '_blank');
    }

    // Admin verification (for testing - in production this would be in the admin panel)
    window.verifySeller = function(userId) {
        const payment = adminData.payments.find(p => p.userId === userId && p.status === 'pending');
        if (payment) {
            payment.status = 'completed';
            if (!adminData.approvedSellers.includes(userId)) {
                adminData.approvedSellers.push(userId);
            }
            saveAll();
            return 'Verified!';
        }
        return 'No pending payment found';
    };

    window.verifyAllPending = function() {
        adminData.payments.forEach(p => {
            if (p.status === 'pending') {
                p.status = 'completed';
                if (!adminData.approvedSellers.includes(p.userId)) {
                    adminData.approvedSellers.push(p.userId);
                }
            }
        });
        saveAll();
        return 'All pending payments verified!';
    };

    // ==================== CART ====================
    function addToCart(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        cart.push({ ...item, cartId: Date.now() });
        saveAll();
        updateCartDot();
        showToast(`${item.title} added! 🛒`);
    }

    function removeFromCart(cartId) {
        cart = cart.filter(i => i.cartId !== cartId);
        saveAll();
        updateCartDot();
        openCart();
    }

    function openCart() {
        const total = cart.reduce((s, i) => s + i.price, 0);
        const commission = total >= 10000 ? total * 0.05 : total * 0.03;
        
        const html = `
        <div class="modal-overlay open" id="cartModal" onclick="if(event.target===this)closeModal()">
            <div class="modal-sheet">
                <div class="modal-handle"></div>
                <h2>🛒 Your Cart</h2>
                ${cart.length === 0 ? `
                    <div style="text-align:center;padding:40px;">
                        <p style="font-size:3rem;">🛍️</p>
                        <h3>Your cart is empty</h3>
                        <p style="color:var(--text-secondary);">Tap + on items to add them here</p>
                    </div>
                ` : `
                    ${cart.map(item => `
                        <div style="display:flex;gap:12px;align-items:center;padding:12px;background:var(--bg);border-radius:10px;margin-bottom:8px;">
                            <div style="width:50px;height:50px;background-image:url('${item.img}');background-size:cover;border-radius:8px;flex-shrink:0;"></div>
                            <div style="flex:1;min-width:0;">
                                <div style="font-weight:600;font-size:0.85rem;">${item.title}</div>
                                <div style="color:var(--gold-dark);font-weight:700;">KSH ${item.price.toLocaleString()}</div>
                            </div>
                            <button onclick="removeFromCart(${item.cartId})" style="background:none;border:none;cursor:pointer;font-size:1.1rem;">🗑️</button>
                        </div>
                    `).join('')}
                    <hr style="margin:12px 0;">
                    <div style="display:flex;justify-content:space-between;font-weight:700;">
                        <span>Subtotal</span><span>KSH ${total.toLocaleString()}</span>
                    </div>
                    <p style="color:var(--gold);font-size:0.8rem;text-align:center;">Commission (${total>=10000?'5%':'3%'}): KSH ${commission.toFixed(2)}</p>
                    <p style="text-align:center;font-size:0.8rem;">Seller receives: <strong>KSH ${(total-commission).toFixed(2)}</strong></p>
                    <button class="btn btn-gold btn-block" onclick="checkout()">Place Order</button>
                `}
                <button class="btn btn-outline btn-block" onclick="closeModal()">Close</button>
            </div>
        </div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function checkout() {
        if (!currentUser) {
            closeModal();
            showLogin();
            return;
        }
        if (cart.length === 0) return;
        
        const total = cart.reduce((s, i) => s + i.price, 0);
        const commission = total >= 10000 ? total * 0.05 : total * 0.03;
        
        const order = {
            id: Date.now(),
            buyer: currentUser.name,
            buyerId: currentUser.id,
            sellerId: cart[0]?.sellerId || 'various',
            items: cart.map(i => i.title),
            total: total,
            commission: commission,
            date: new Date().toISOString()
        };
        orders.push(order);
        cart = [];
        saveAll();
        closeModal();
        showToast('Order placed! ✅');
        updateCartDot();
    }

    function updateCartDot() {
        document.getElementById('cartDot').classList.toggle('show', cart.length > 0);
    }

    function updateUserBadge() {
        const badge = document.getElementById('userStatusBadge');
        if (currentUser && isVerifiedSeller()) {
            badge.className = 'status-badge status-approved';
            badge.textContent = '✅ Verified';
            badge.classList.remove('hidden');
        } else if (currentUser && isPendingVerification()) {
            badge.className = 'status-badge status-pending';
            badge.textContent = '⏳ Pending';
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    // ==================== LOGIN ====================
    function showLogin() {
        const html = `
        <div class="modal-overlay open" id="loginModal" onclick="if(event.target===this)closeModal()">
            <div class="modal-sheet">
                <div class="modal-handle"></div>
                <h2>Create Account</h2>
                <div class="form-group"><label>Full Name</label><input class="form-input" id="loginName" placeholder="John Doe"></div>
                <div class="form-group"><label>Phone Number</label><input class="form-input" id="loginPhone" placeholder="0712345678"></div>
                <button class="btn btn-gold btn-block" onclick="registerUser()">Register</button>
                <button class="btn btn-outline btn-block" onclick="closeModal()">Cancel</button>
            </div>
        </div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function registerUser() {
        const name = document.getElementById('loginName').value.trim();
        const phone = document.getElementById('loginPhone').value.trim();
        if (!name) return alert('Please enter your name');
        
        currentUser = {
            id: Date.now(),
            name: name,
            phone: phone,
            registeredAt: new Date().toISOString()
        };
        saveAll();
        closeModal();
        showToast(`Welcome, ${name}! 👋`);
        updateUserBadge();
    }

    function logout() {
        currentUser = null;
        localStorage.removeItem('sc_user');
        cart = [];
        saveAll();
        page = 'home';
        renderPage();
        updateCartDot();
        showToast('Logged out');
    }

    // ==================== MISC ====================
    function showListForm() {
        alert('List form would open here. In production, you upload photos, set price, and submit for admin review.');
    }

    function viewItem(id) {
        const item = items.find(i => i.id === id);
        if (!item) return;
        const html = `
        <div class="modal-overlay open" onclick="if(event.target===this)closeModal()">
            <div class="modal-sheet">
                <div class="modal-handle"></div>
                <img src="${item.img}" style="width:100%;border-radius:12px;aspect-ratio:1/1;object-fit:cover;">
                <h2 style="margin-top:16px;">${item.title}</h2>
                <p style="font-size:1.4rem;font-weight:800;color:var(--gold-dark);">KSH ${item.price.toLocaleString()}</p>
                <p>${item.desc}</p>
                <p style="color:var(--text-secondary);">Seller: ${item.seller} • ⭐ ${item.rating}</p>
                <button class="btn btn-gold btn-block" onclick="addToCart(${item.id});closeModal();">Add to Cart</button>
                <button class="btn btn-outline btn-block" onclick="closeModal()">Close</button>
            </div>
        </div>`;
        document.getElementById('modalContainer').innerHTML = html;
    }

    function bookService(type) { alert(`Service "${type}" booked! (simulated) We'll contact you via WhatsApp: ${WHATSAPP_NUMBER}`); }
    function showDeliveryOptions() { alert('Delivery options: Sendy, Fargo, G4S. Choose at checkout.'); }
    function purchaseReport() { alert(`Market report purchase simulated. Pay KSH 2,000 to ${MASTER_MPESA}`); }
    function toggleDark(val) { settings.darkMode = val; document.body.classList.toggle('dark-mode', val); saveAll(); }
    function searchItems() { if (page === 'home' || page === 'large') renderPage(); }
    function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

    // ==================== PWA INSTALL ====================
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installPrompt').classList.remove('hidden');
    });

    function installApp() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => {
                document.getElementById('installPrompt').classList.add('hidden');
            });
        } else {
            alert('To install: open in Chrome/Safari → tap Share → Add to Home Screen');
        }
    }

    window.addEventListener('appinstalled', () => {
        document.getElementById('installPrompt').classList.add('hidden');
    });

    // ==================== INIT ====================
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
            page = e.currentTarget.dataset.page;
            renderPage();
        });
    });

    if (settings.darkMode) document.body.classList.add('dark-mode');
    renderPage();
    updateCartDot();
    updateUserBadge();

    console.log('💰 SecondChance App Ready');
    console.log('📱 WhatsApp Help:', WHATSAPP_NUMBER);
    console.log('💳 M-Pesa Master:', MASTER_MPESA);
    console.log('🔧 Admin commands: verifySeller(userId), verifyAllPending()');
</script>
</body>
