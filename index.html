<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SecondChance Admin • Master Control Panel</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SecondChance Admin">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --black: #0a0a0a; --black-light: #1a1a1a; --black-surface: #141414;
            --gold: #c9a84c; --gold-light: #d4b96a; --gold-dark: #a68a3e;
            --brown: #8b6914; --grey: #6b7280; --grey-light: #9ca3af;
            --white: #e5e7eb; --white-bright: #f9fafb;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
            --border: #2d2d2d; --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 12px; --transition: all 0.3s ease;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--black); color:var(--white); min-height:100vh; }
        .admin-container { display:flex; min-height:100vh; }
        .sidebar { width:280px; background:var(--black-surface); border-right:1px solid rgba(201,168,76,0.2); padding:28px 0; position:fixed; top:0; left:0; bottom:0; overflow-y:auto; z-index:100; }
        .sidebar-logo { padding:0 24px 28px; border-bottom:1px solid rgba(201,168,76,0.3); margin-bottom:28px; }
        .sidebar-logo h1 { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:900; background:linear-gradient(135deg,var(--gold),var(--gold-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .master-account { margin:0 16px 20px; padding:16px; background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(139,105,20,0.1)); border:1px solid rgba(201,168,76,0.3); border-radius:var(--radius); }
        .master-account-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--gold); }
        .master-account-number { font-size:1.1rem; font-weight:700; color:var(--white-bright); font-family:'Courier New',monospace; }
        .master-account-balance { font-size:1.4rem; font-weight:800; color:var(--gold); margin-top:6px; }
        .nav-item { display:flex; align-items:center; gap:14px; padding:12px 16px; border-radius:10px; cursor:pointer; color:var(--grey-light); font-size:0.9rem; margin-bottom:4px; }
        .nav-item:hover { background:rgba(201,168,76,0.08); color:var(--gold-light); }
        .nav-item.active { background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(139,105,20,0.1)); color:var(--gold); border-left:3px solid var(--gold); }
        .nav-badge { background:var(--gold); color:var(--black); border-radius:12px; padding:2px 8px; font-size:0.7rem; font-weight:700; margin-left:auto; }
        .main-content { flex:1; margin-left:280px; padding:36px; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:36px; }
        .top-bar h2 { font-family:'Playfair Display',serif; font-size:2rem; background:linear-gradient(135deg,var(--white-bright),var(--gold-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; margin-bottom:36px; }
        .stat-card { background:var(--black-surface); border-radius:var(--radius); padding:24px; border:1px solid rgba(201,168,76,0.15); }
        .stat-card:hover { border-color:var(--gold); }
        .stat-value { font-size:2.2rem; font-weight:800; color:var(--gold); font-family:'Playfair Display',serif; }
        .table-container { background:var(--black-surface); border-radius:var(--radius); border:1px solid rgba(201,168,76,0.15); overflow:hidden; margin-bottom:28px; }
        .table-header { display:flex; justify-content:space-between; align-items:center; padding:20px 24px; border-bottom:1px solid rgba(201,168,76,0.2); background:rgba(201,168,76,0.03); }
        .table-header h3 { color:var(--gold-light); }
        table { width:100%; border-collapse:collapse; }
        th { text-align:left; padding:14px 24px; font-size:0.75rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--grey); }
        td { padding:16px 24px; border-bottom:1px solid rgba(201,168,76,0.1); font-size:0.9rem; }
        .btn { padding:10px 18px; border-radius:8px; border:none; cursor:pointer; font-weight:600; font-size:0.85rem; display:inline-flex; align-items:center; gap:6px; }
        .btn-primary { background:linear-gradient(135deg,var(--gold-dark),var(--gold)); color:var(--black); }
        .btn-success { background:var(--success); color:white; }
        .btn-danger { background:var(--danger); color:white; }
        .btn-outline { border:1px solid rgba(201,168,76,0.4); background:transparent; color:var(--gold-light); }
        .status-badge { padding:5px 12px; border-radius:20px; font-size:0.75rem; font-weight:700; }
        .status-pending { background:rgba(245,158,11,0.2); color:var(--warning); }
        .status-approved { background:rgba(16,185,129,0.2); color:var(--success); }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:1000; display:flex; align-items:center; justify-content:center; }
        .modal { background:var(--black-surface); border-radius:var(--radius); padding:32px; max-width:560px; width:90%; max-height:85vh; overflow-y:auto; border:1px solid rgba(201,168,76,0.3); }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; margin-bottom:8px; font-weight:600; font-size:0.9rem; color:var(--grey-light); }
        .form-input { width:100%; padding:12px 16px; border:1px solid rgba(201,168,76,0.3); border-radius:8px; background:var(--black-light); color:var(--white); }
        @media (max-width:768px) {
            .sidebar { width:100%; height:auto; position:relative; }
            .main-content { margin-left:0; padding:20px; }
        }
    </style>
</head>
<body>

<!-- Password Gate - No hint, no default password shown -->
<div class="modal-overlay" id="authOverlay" style="display:flex;">
    <div class="modal">
        <h2 style="color:var(--gold);">🔐 Admin Login</h2>
        <div class="form-group">
            <label>Enter Admin Password</label>
            <input type="password" class="form-input" id="authPassword" placeholder="••••••••" autocomplete="off">
        </div>
        <button class="btn btn-primary" onclick="authenticate()">Unlock</button>
    </div>
</div>

<div class="admin-container" id="adminContainer" style="display:none;">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <h1>SecondChance</h1>
            <span style="color:var(--grey-light);font-size:0.75rem;">Master Control Panel</span>
        </div>
        <div class="master-account">
            <div class="master-account-label">👑 Master Account</div>
            <div class="master-account-number" id="masterPhoneDisplay">0792091769</div>
            <div class="master-account-balance" id="masterBalance">KSH 0</div>
        </div>
        <div class="nav-item active" onclick="navigateTo('dashboard')"><i class="fas fa-th-large"></i> Dashboard</div>
        <div class="nav-item" onclick="navigateTo('payments')"><i class="fas fa-money-bill-wave"></i> Payments <span class="nav-badge" id="pendingPaymentsBadge">0</span></div>
        <div class="nav-item" onclick="navigateTo('products')"><i class="fas fa-box"></i> Products <span class="nav-badge" id="pendingProductsBadge">0</span></div>
        <div class="nav-item" onclick="navigateTo('users')"><i class="fas fa-users"></i> Users</div>
        <div class="nav-item" onclick="navigateTo('commissions')"><i class="fas fa-percent"></i> Commissions</div>
        <div class="nav-item" onclick="navigateTo('settings')"><i class="fas fa-cog"></i> Settings</div>
    </aside>
    <main class="main-content" id="mainContent"></main>
</div>

<!-- Price Adjustment Modal -->
<div class="modal-overlay" id="priceModal" style="display:none;">
    <div class="modal">
        <h2 style="color:var(--gold);">💰 Adjust Price</h2>
        <div class="form-group"><label>Current Price</label><input type="text" class="form-input" id="currentPriceDisplay" disabled></div>
        <div class="form-group"><label>New Price (KSH)</label><input type="number" class="form-input" id="newPrice" min="0"></div>
        <button class="btn btn-primary" onclick="savePriceAdjustment()">Save</button>
        <button class="btn btn-outline" onclick="closePriceModal()">Cancel</button>
    </div>
</div>

<script>
const DEFAULT_PASSWORD = 'benja2005';

let adminData = JSON.parse(localStorage.getItem('secondchance_admin_data')) || {
    payments: [], approvedSellers: [], products: [], users: [], orders: [], activityLog: [],
    settings: { registrationFee:350, lowCommission:3, highCommission:5, masterAccount:'0792091769', adminPassword:DEFAULT_PASSWORD, passwordVersion:1 }
};
if (!adminData.settings.adminPassword) adminData.settings.adminPassword = DEFAULT_PASSWORD;
if (!adminData.settings.passwordVersion) adminData.settings.passwordVersion = 1;

let currentView = 'dashboard';
let priceEditId = null;

function save() { localStorage.setItem('secondchance_admin_data', JSON.stringify(adminData)); updateUI(); }
function updateUI() {
    document.getElementById('masterBalance').textContent = 'KSH ' + (adminData.payments.filter(p=>p.status==='completed').reduce((s,p)=>s+p.amount,0) + adminData.orders.reduce((s,o)=>s+o.commission,0)).toLocaleString();
    document.getElementById('masterPhoneDisplay').textContent = adminData.settings.masterAccount;
    document.getElementById('pendingPaymentsBadge').textContent = adminData.payments.filter(p=>p.status==='pending').length;
    document.getElementById('pendingProductsBadge').textContent = adminData.products.filter(p=>p.status==='pending').length;
}

function checkSession() {
    const storedVersion = localStorage.getItem('sc_admin_session');
    if (storedVersion && parseInt(storedVersion) === adminData.settings.passwordVersion) {
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('adminContainer').style.display = 'flex';
        loadView('dashboard');
        return true;
    }
    document.getElementById('authOverlay').style.display = 'flex';
    document.getElementById('adminContainer').style.display = 'none';
    return false;
}

function authenticate() {
    if (document.getElementById('authPassword').value === adminData.settings.adminPassword) {
        localStorage.setItem('sc_admin_session', adminData.settings.passwordVersion);
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('adminContainer').style.display = 'flex';
        loadView('dashboard');
    } else alert('Wrong password');
}

function navigateTo(view) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.target.closest('.nav-item').classList.add('active');
    loadView(view);
}

function loadView(view) {
    const c = document.getElementById('mainContent');
    switch(view) {
        case 'dashboard': c.innerHTML = dashboardHTML(); break;
        case 'payments': c.innerHTML = paymentsHTML(); break;
        case 'products': c.innerHTML = productsHTML(); break;
        case 'users': c.innerHTML = usersHTML(); break;
        case 'commissions': c.innerHTML = commissionsHTML(); break;
        case 'settings': c.innerHTML = settingsHTML(); break;
    }
    updateUI();
}

function dashboardHTML() {
    const rev = adminData.payments.filter(p=>p.status==='completed').reduce((s,p)=>s+p.amount,0) + adminData.orders.reduce((s,o)=>s+o.commission,0);
    return `<div class="top-bar"><h2>📊 Dashboard</h2></div>
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${adminData.payments.length}</div><div>Payments</div></div>
        <div class="stat-card"><div class="stat-value">${adminData.products.length}</div><div>Products</div></div>
        <div class="stat-card"><div class="stat-value">KSH ${rev.toLocaleString()}</div><div>Revenue</div></div>
        <div class="stat-card"><div class="stat-value">${adminData.approvedSellers.length}</div><div>Sellers</div></div>
    </div>`;
}

function paymentsHTML() {
    let rows = adminData.payments.map(p => `
        <tr>
            <td>${p.userName}</td><td>KSH ${p.amount}</td><td>${p.code}</td>
            <td><span class="status-badge status-${p.status}">${p.status}</span></td>
            <td>${p.status==='pending' ? `<button class="btn btn-success" onclick="verifyPayment('${p.id}')">Verify</button>` : ''}</td>
        </tr>`).join('');
    return `<div class="top-bar"><h2>💳 Payments</h2></div>
    <div class="table-container"><table><tr><th>User</th><th>Amount</th><th>Code</th><th>Status</th><th>Action</th></tr>${rows}</table></div>`;
}

function verifyPayment(id) {
    const p = adminData.payments.find(p => p.id == id);
    if (p) {
        p.status = 'completed';
        if (!adminData.approvedSellers.includes(p.userId)) adminData.approvedSellers.push(p.userId);
        save();
        loadView('payments');
    }
}

function productsHTML() {
    let rows = adminData.products.map(p => `
        <tr>
            <td>${p.title}</td><td>KSH ${p.price}</td><td>${p.seller}</td>
            <td><span class="status-badge status-${p.status}">${p.status}</span></td>
            <td>
                ${p.status==='pending' ? `<button class="btn btn-success" onclick="approveProduct(${p.id})">Approve</button>` : ''}
                <button class="btn btn-outline" onclick="openPriceModal(${p.id},${p.price})">💰</button>
            </td>
        </tr>`).join('');
    return `<div class="top-bar"><h2>📦 Products</h2></div>
    <div class="table-container"><table><tr><th>Title</th><th>Price</th><th>Seller</th><th>Status</th><th>Actions</th></tr>${rows}</table></div>`;
}

function approveProduct(id) {
    const p = adminData.products.find(p => p.id == id);
    if (p) { p.status = 'approved'; save(); loadView('products'); }
}

function openPriceModal(id, price) {
    priceEditId = id;
    document.getElementById('currentPriceDisplay').value = 'KSH ' + price.toLocaleString();
    document.getElementById('newPrice').value = price;
    document.getElementById('priceModal').style.display = 'flex';
}
function closePriceModal() { document.getElementById('priceModal').style.display = 'none'; }
function savePriceAdjustment() {
    const newPrice = parseInt(document.getElementById('newPrice').value);
    if (!newPrice) return;
    const p = adminData.products.find(p => p.id == priceEditId);
    if (p) { p.price = newPrice; save(); loadView('products'); closePriceModal(); }
}

function usersHTML() {
    let rows = adminData.users.map(u => `<tr><td>${u.name}</td><td>${u.phone}</td><td>${u.sellerStatus}</td></tr>`).join('');
    return `<div class="top-bar"><h2>👥 Users</h2></div><div class="table-container"><table><tr><th>Name</th><th>Phone</th><th>Status</th></tr>${rows}</table></div>`;
}

function commissionsHTML() {
    return `<div class="top-bar"><h2>💰 Commissions</h2></div>
    <div class="table-container" style="padding:24px;">
        <div class="form-group"><label>Below 10K (%)</label><input type="number" class="form-input" id="lowComm" value="${adminData.settings.lowCommission}"></div>
        <div class="form-group"><label>10K+ (%)</label><input type="number" class="form-input" id="highComm" value="${adminData.settings.highCommission}"></div>
        <button class="btn btn-primary" onclick="saveCommission()">Save</button>
    </div>`;
}
function saveCommission() {
    adminData.settings.lowCommission = parseFloat(document.getElementById('lowComm').value);
    adminData.settings.highCommission = parseFloat(document.getElementById('highComm').value);
    save();
    alert('Commissions updated!');
}

function settingsHTML() {
    return `<div class="top-bar"><h2>⚙️ Settings</h2></div>
    <div class="table-container" style="padding:24px;">
        <div class="form-group"><label>Registration Fee (KSH)</label><input type="number" class="form-input" id="regFee" value="${adminData.settings.registrationFee}"></div>
        <div class="form-group"><label>New Admin Password</label><input type="password" class="form-input" id="newPassword" placeholder="Enter new password"></div>
        <div class="form-group"><label>Confirm New Password</label><input type="password" class="form-input" id="confirmPassword" placeholder="Confirm new password"></div>
        <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
    </div>`;
}
function saveSettings() {
    const newPass = document.getElementById('newPassword').value;
    const confirmPass = document.getElementById('confirmPassword').value;
    if (newPass) {
        if (newPass !== confirmPass) return alert('Passwords do not match');
        adminData.settings.adminPassword = newPass;
        adminData.settings.passwordVersion = (adminData.settings.passwordVersion || 1) + 1;
        localStorage.removeItem('sc_admin_session');
        save();
        alert('Settings saved! All other admin sessions have been revoked.');
        document.getElementById('adminContainer').style.display = 'none';
        document.getElementById('authOverlay').style.display = 'flex';
        document.getElementById('authPassword').value = '';
    } else {
        adminData.settings.registrationFee = parseInt(document.getElementById('regFee').value);
        save();
        alert('Settings saved!');
    }
}

window.addEventListener('storage', (e) => {
    if (e.key === 'secondchance_admin_data') {
        adminData = JSON.parse(localStorage.getItem('secondchance_admin_data'));
        loadView(currentView);
    }
});

checkSession();
updateUI();
</script>
</body>
    </html>
